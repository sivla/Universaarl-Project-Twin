name: Snapshot-Katalog-Onboarding

on:
  workflow_dispatch:
  pull_request:

jobs:
  katalog:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-14]
    env:
      XDG_CONFIG_HOME: ${{ github.workspace }}/.xdg
      UABC_PORTABLE_PRODUCER_ROOT: ${{ github.workspace }}/producer
      UABC_REQUIRE_PORTABLE_PRODUCER: '1'
    defaults:
      run:
        working-directory: twin
    steps:
      - name: Project Twin frisch auschecken
        uses: actions/checkout@v4
        with:
          path: twin
      - name: Freigegebenen BC-Basic-Producer auschecken
        uses: actions/checkout@v4
        with:
          repository: sivla/FiBu
          ref: codex/universaarl-projekt
          path: producer
      - name: Node.js bereitstellen
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: twin/package-lock.json
      - name: Abhängigkeiten installieren
        run: npm ci
      - name: Bootstrap ohne lokale Quelle prüfen
        run: npm run twin:bootstrap
      - name: Externe XDG-Konfiguration erzeugen
        shell: bash
        run: |
          npm run twin:configure -- --catalog-id bc-basic --catalog-type filesystem --catalog-address "${UABC_PORTABLE_PRODUCER_ROOT}" --customer-id UABC-CUSTOMER-001 --project-id UABC-BC-BASIC-001 --display-name "Universaarl BC Basic"
      - name: Doctor und Vertragsmatrix
        shell: bash
        run: |
          npm run twin:doctor
          npx vitest run tests/snapshot-catalog.test.ts tests/local-starter-portable.test.ts
      - name: Twin starten und Status prüfen
        shell: bash
        run: |
          npm run twin:start -- --port 4173 --timeout 60
          npm run twin:status -- --port 4173
      - name: Echter Browser-Smoke
        run: node scripts/browser-smoke.mjs http://127.0.0.1:4173/ http://127.0.0.1:4173/projekte/bc-basic/aktueller-stand
      - name: Twin sicher beenden
        if: always()
        run: npm run twin:stop -- --port 4173
      - name: Bereinigte Evidence schreiben
        if: always()
        shell: bash
        env:
          UNIVERSAARL_CATALOG_GATES: ${{ job.status == 'success' && 'passed' || 'pending' }}
        run: node scripts/collect-ci-evidence.mjs "${RUNNER_TEMP}/snapshot-katalog-${{ matrix.os }}.json"
      - name: Evidence hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-katalog-${{ matrix.os }}
          path: ${{ runner.temp }}/snapshot-katalog-${{ matrix.os }}.json
          if-no-files-found: error
